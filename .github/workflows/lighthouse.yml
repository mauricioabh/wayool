name: Lighthouse CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lighthouse:
    name: Core Web Vitals (lab)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Start production server
        run: npm run start &

      - name: Wait for Next.js
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && echo "Ready after ${i}s" && exit 0
            sleep 1
          done
          echo "::error::Next.js did not become ready in 30s" && exit 1

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
